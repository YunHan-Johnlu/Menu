<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>埤塘生態古書誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background-color: #dcd7c9; /* 仿古紙色 */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c2bdac' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Noto Serif TC', serif; 
            color: #2c2416; 
            overflow: hidden; 
        }
        .slider { display: flex; width: 400vw; height: 100vh; transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .slide { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        /* 古書頁面樣式 */
        .page { 
            width: 90%; max-width: 550px; height: 80vh; 
            background: #fdfaf6; 
            border: 2px solid #a69e8b;
            padding: 50px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.2), inset 0 0 100px rgba(0,0,0,0.02);
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 裝飾線 */
        .page::before { content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border: 1px solid #c2b9a7; pointer-events: none; }
        
        .img-box { width: 100%; height: 300px; border: 1px solid #b3a692; margin: 30px 0; background: #f0ede8; display: flex; align-items: center; justify-content: center; color: #8e836d; font-family: cursive; }
        
        .title { font-size: 2.5rem; border-bottom: 2px double #8e836d; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="slider" id="slider">
    <!-- 頁面 1 -->
    <div class="slide">
        <div class="page">
            <h1 class="title">田園幻夢</h1>
            <div class="img-box">[ 插入田園幻夢照片 ]</div>
            <p class="text-xl leading-loose">福壽螺，外來之物，引埤塘之劫。碎巧克力如沃土，粉色卵塊現原形，實為生態警世之作。</p>
        </div>
    </div>
    <!-- 頁面 2 -->
    <div class="slide">
        <div class="page">
            <h1 class="title">椒鹽酥炸水蠆</h1>
            <div class="img-box">[ 插入酥炸水蠆照片 ]</div>
            <p class="text-xl leading-loose">蜻蜓之幼體，潛伏水中。經高溫油炸，盡顯其靈動生命之轉化。</p>
        </div>
    </div>
    <!-- 頁面 3 -->
    <div class="slide">
        <div class="page">
            <h1 class="title">琥珀萍蓬草苞慕斯</h1>
            <div class="img-box">[ 插入慕斯照片 ]</div>
            <p class="text-xl leading-loose">淤泥深處，慕斯如土。點綴未開之花苞，見原生植物不屈之姿。</p>
        </div>
    </div>
    <!-- 頁面 4 -->
    <div class="slide">
        <div class="page">
            <h1 class="title">爆炒龍蝨</h1>
            <div class="img-box">[ 插入爆炒龍蝨照片 ]</div>
            <p class="text-xl leading-loose">水中潛者，龍蝨之屬。爆炒以存其鮮，此乃水域清澈與否之明鏡。</p>
        </div>
    </div>
</div>

<script>
    let pos = 0;
    document.addEventListener('click', () => {
        pos = (pos + 1) % 4;
        document.getElementById('slider').style.transform = `translateX(-${pos * 100}vw)`;
    });
</script>

</body>
</html>
