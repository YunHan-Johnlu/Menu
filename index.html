<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>埤塘生態古書誌</title>
    <!-- 引入 Tailwind CSS 確保響應式佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            background-color: #dcd7c9; /* 仿古紙色 */
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c2bdac' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Noto Serif TC', serif; 
            color: #2c2416; 
            overflow: hidden; 
            user-select: none;
        }
        
        /* 幻燈片容器 */
        .slider { 
            display: flex; 
            width: 400vw; 
            height: 100vh; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        
        .slide { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        
        /* 古書頁面精緻化樣式 */
        .page { 
            width: 95%; 
            max-width: 520px; 
            height: 82vh; 
            background: #fbf8f2; 
            border: 2px solid #a69e8b;
            padding: 35px 40px;
            box-shadow: 15px 15px 45px rgba(44, 36, 22, 0.25), inset 0 0 80px rgba(180, 160, 120, 0.15);
            position: relative;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: space-between;
            border-radius: 4px;
        }
        
        /* 古書雙邊框裝飾 */
        .page::before { 
            content: ""; 
            position: absolute; 
            top: 12px; 
            left: 12px; 
            right: 12px; 
            bottom: 12px; 
            border: 1px solid #c2b9a7; 
            pointer-events: none; 
        }
        
        .page::after {
            content: "";
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            bottom: 16px;
            border: 1px double #d6ceb8;
            pointer-events: none;
            opacity: 0.7;
        }
        
        /* 古書線裝書脊模擬線（位於左側，呈現翻頁書卷感） */
        .book-spine {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 15px;
            background: linear-gradient(to right, rgba(0,0,0,0.15), rgba(0,0,0,0));
            border-right: 1px solid rgba(0,0,0,0.05);
            pointer-events: none;
        }
        
        /* 圖片容器：優化長寬比與古風外框 */
        .img-box { 
            width: 100%; 
            height: 48%;
            border: 1px solid #b3a692; 
            margin: 15px 0; 
            background: #ece8e0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .img-box:hover img {
            transform: scale(1.03);
        }
        
        .title { 
            font-size: 2rem; 
            font-weight: 700;
            border-bottom: 2px double #8e836d; 
            padding-bottom: 6px; 
            color: #3e321c;
            letter-spacing: 0.1em;
            text-align: center;
        }

        /* 頁面切換控制鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: rgba(220, 215, 201, 0.85);
            border: 1px solid #a69e8b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a3e2e;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 50;
        }
        .nav-btn:hover {
            background: #4a3e2e;
            color: #fdfaf6;
            border-color: #4a3e2e;
        }

        /* 頁碼指示點 */
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #b8b1a0;
            margin: 0 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active {
            background: #4a3e2e;
            transform: scale(1.3);
        }

        /* 手機直向優化調整 */
        @media (max-height: 680px) {
            .page {
                height: 88vh;
                padding: 20px 25px;
            }
            .title {
                font-size: 1.6rem;
            }
            .img-box {
                height: 42%;
                margin: 10px 0;
            }
            p {
                font-size: 0.95rem !important;
                line-height: 1.6 !important;
            }
        }
    </style>
</head>
<body>

<!-- 書脊與裝飾背景層 -->
<div class="fixed inset-0 pointer-events-none border-[12px] border-[#c2bdac] opacity-30 z-10"></div>

<!-- 左右切換按鈕 -->
<button class="nav-btn left-4 md:left-10" id="prevBtn" aria-label="上一頁">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
</button>
<button class="nav-btn right-4 md:right-10" id="nextBtn" aria-label="下一頁">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
</button>

<!-- 幻燈片主容器 -->
<div class="slider" id="slider">
    <!-- 頁面 1 -->
    <div class="slide">
        <div class="page">
            <div class="book-spine"></div>
            <div class="text-xs text-[#8e836d] tracking-widest uppercase mb-1">卷一・田園幻夢</div>
            <h1 class="title">田園幻夢</h1>
            <div class="img-box">
                <img src="1.png" alt="" onerror="handleImageError(this, '田園幻夢')">
            </div>
            <p class="text-[17px] md:text-lg leading-loose text-[#423521] text-justify px-2 font-light">
                福壽螺，外來之物，引埤塘之劫。碎巧克力如沃土，粉色卵塊現原形，實為生態警世之作。
            </p>
            <div class="text-xs text-[#a69e8b] mt-2">— 頁 壹 —</div>
        </div>
    </div>
    
    <!-- 頁面 2 -->
    <div class="slide">
        <div class="page">
            <div class="book-spine"></div>
            <div class="text-xs text-[#8e836d] tracking-widest uppercase mb-1">卷二・椒鹽水蠆</div>
            <h1 class="title">椒鹽酥炸水蠆</h1>
            <div class="img-box">
                <img src="2.png" alt="" onerror="handleImageError(this, '酥炸水蠆')">
            </div>
            <p class="text-[17px] md:text-lg leading-loose text-[#423521] text-justify px-2 font-light">
                蜻蜓之幼體，潛伏水中。經高溫油炸，盡顯其靈動生命之轉化。
            </p>
            <div class="text-xs text-[#a69e8b] mt-2">— 頁 貳 —</div>
        </div>
    </div>
    
    <!-- 頁面 3 -->
    <div class="slide">
        <div class="page">
            <div class="book-spine"></div>
            <div class="text-xs text-[#8e836d] tracking-widest uppercase mb-1">卷三・萍蓬草慕斯</div>
            <h1 class="title">琥珀萍蓬草苞慕斯</h1>
            <div class="img-box">
                <img src="3.png" alt="" onerror="handleImageError(this, '萍蓬草苞慕斯')">
            </div>
            <p class="text-[17px] md:text-lg leading-loose text-[#423521] text-justify px-2 font-light">
                淤泥深處，慕斯如土。點綴未開之花苞，見原生植物不屈之姿。
            </p>
            <div class="text-xs text-[#a69e8b] mt-2">— 頁 參 —</div>
        </div>
    </div>
    
    <!-- 頁面 4 -->
    <div class="slide">
        <div class="page">
            <div class="book-spine"></div>
            <div class="text-xs text-[#8e836d] tracking-widest uppercase mb-1">卷四・爆炒龍蝨</div>
            <h1 class="title">爆炒龍蝨</h1>
            <div class="img-box">
                <img src="4.png" alt="" onerror="handleImageError(this, '爆炒龍蝨')">
            </div>
            <p class="text-[17px] md:text-lg leading-loose text-[#423521] text-justify px-2 font-light">
                水中潛者，龍蝨之屬。爆炒以存其鮮，此乃水域清澈與否之明鏡。
            </p>
            <div class="text-xs text-[#a69e8b] mt-2">— 頁 肆 —</div>
        </div>
    </div>
</div>

<!-- 底部導覽頁碼 -->
<div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex items-center z-40">
    <div class="dot active" onclick="goToPage(0)"></div>
    <div class="dot" onclick="goToPage(1)"></div>
    <div class="dot" onclick="goToPage(2)"></div>
    <div class="dot" onclick="goToPage(3)"></div>
</div>

<script>
    let pos = 0;
    const totalPages = 4;
    const slider = document.getElementById('slider');
    const dots = document.querySelectorAll('.dot');

    // 圖片載入錯誤時的優雅退場機制（產生帶有古風氛圍的文字佔位符圖）
    function handleImageError(imgElement, titleText) {
        imgElement.onerror = null; // 防止無限迴圈
        const parent = imgElement.parentElement;
        parent.innerHTML = `
            <div class="flex flex-col items-center justify-center text-center p-4 h-full w-full bg-gradient-to-br from-[#eae5da] to-[#dfdacd]">
                <svg class="w-12 h-12 text-[#9e937d] mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span class="text-[#7a6f5a] font-serif text-sm tracking-widest">[ 繪卷：${titleText} ]</span>
                <span class="text-[10px] text-[#a69e8b] mt-1 font-sans">無圖檔或載入中</span>
            </div>
        `;
    }

    // 更新滑動與點選狀態
    function updateSlider() {
        slider.style.transform = `translateX(-${pos * 100}vw)`;
        
        // 更新小圓點狀態
        dots.forEach((dot, index) => {
            if (index === pos) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    // 前往特定頁面
    function goToPage(pageIndex) {
        pos = pageIndex;
        updateSlider();
    }

    // 下一頁
    function nextPage() {
        pos = (pos + 1) % totalPages;
        updateSlider();
    }

    // 上一頁
    function prevPage() {
        pos = (pos - 1 + totalPages) % totalPages;
        updateSlider();
    }

    // 綁定按鈕點擊事件
    document.getElementById('nextBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        nextPage();
    });

    document.getElementById('prevBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        prevPage();
    });

    // 鍵盤左右方向鍵支援
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            nextPage();
        } else if (e.key === 'ArrowLeft') {
            prevPage();
        }
    });

    // --- 觸控滑動手勢支援 (Mobile Swipe Support) ---
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    function handleSwipe() {
        const threshold = 50; // 滑動靈敏度距離 (px)
        if (touchStartX - touchEndX > threshold) {
            // 向左滑，看下一張
            nextPage();
        } else if (touchEndX - touchStartX > threshold) {
            // 向右滑，看上一張
            prevPage();
        }
    }
</script>

</body>
</html>
